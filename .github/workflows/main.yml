name: Stock Monitor Bot

on:
  schedule:
    # Brazilian market operates from 10am to 5pm (Brasília Time).
    # Since GitHub uses UTC (Brasília +3h), cron should be from 1pm to 8pm UTC.
    # '*/30' means every 30 minutes.
    - cron: '*/30 13-20 * * 1-5'
  workflow_dispatch: # Allows you to run the bot manually via "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permissions so the bot can do "git push" for the updated CSV
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Using the version you're already using
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib python-dotenv

      - name: Run Stock Bot
        env:
          # Here GitHub takes your Secrets and delivers them to Python via os.environ
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Add only the CSV. We ignore the charts/ folder according to your .gitignore
          git add stock_data.csv charts/*.png
          
          # Only commit if there are changes to the file to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update stock data [skip ci]" && git push)